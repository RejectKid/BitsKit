version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/New_York
    open-pull-requests-limit: 10
    labels: [dependencies]
    groups:
      test-tooling:
        patterns:
          - Microsoft.NET.Test.Sdk
          - MSTest.*
          - coverlet.collector
      roslyn:
        patterns:
          - Microsoft.CodeAnalysis.*

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
      timezone: America/New_York
    open-pull-requests-limit: 10
    labels: [dependencies, github-actions]
