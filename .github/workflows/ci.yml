name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Validate workflows
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore BitsKit.sln --locked-mode

      - name: Build
        run: dotnet build BitsKit.sln --configuration Release --no-restore

      - name: Build InlineArray consumer with modern compiler
        run: dotnet build BitsKit.Tests/BitsKit.Tests.csproj --configuration Release --framework net10.0 --no-restore -p:LangVersion=preview

      - name: Test .NET 8
        run: dotnet test BitsKit.Tests/BitsKit.Tests.csproj --configuration Release --framework net8.0 --no-build --logger "trx;LogFileName=net8-${{ runner.os }}.trx"

      - name: Test .NET 10
        run: dotnet test BitsKit.Tests/BitsKit.Tests.csproj --configuration Release --framework net10.0 --no-build --logger "trx;LogFileName=net10-${{ runner.os }}.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ runner.os }}
          path: '**/TestResults/*.trx'
          if-no-files-found: error
          retention-days: 14

  package:
    name: Validate NuGet package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore BitsKit.sln --locked-mode

      - name: Build
        run: dotnet build BitsKit.sln --configuration Release --no-restore

      - name: Validate benchmark discovery
        shell: pwsh
        run: ./eng/Run-Benchmarks.ps1 -Filter '*' -List -NoRestore

      - name: Pack
        run: dotnet pack BitsKit/BitsKit.csproj --configuration Release --no-build --no-restore --output artifacts -p:PackageVersion=0.0.0-ci.${{ github.run_number }} -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Inspect package
        shell: pwsh
        run: ./eng/Validate-Package.ps1 -PackagePath ./artifacts/RejectKid.BitsKit.0.0.0-ci.${{ github.run_number }}.nupkg -ExpectedVersion 0.0.0-ci.${{ github.run_number }}

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nuget-package
          path: artifacts/*.*nupkg
          if-no-files-found: error
          retention-days: 14
