name: Benchmarks

on:
  pull_request:
    branches: [master]
    paths:
      - '.github/workflows/benchmarks.yml'
      - 'BitsKit/**'
      - 'BitsKit.Benchmarks/**'
      - 'Directory.Build.props'
      - 'eng/Run-Benchmarks.ps1'
  schedule:
    - cron: '17 5 * * 0'
  workflow_dispatch:
    inputs:
      filter:
        description: BenchmarkDotNet glob filter
        required: true
        default: '*'
        type: string
      job:
        description: BenchmarkDotNet job length
        required: true
        default: Short
        type: choice
        options:
          - Dry
          - Short
          - Medium
          - Long

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  benchmark:
    name: Benchmark library features
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BENCHMARK_FILTER: ${{ github.event_name == 'pull_request' && '*Read32BitLSB_BitsKit' || inputs.filter || '*' }}
      BENCHMARK_JOB: ${{ github.event_name == 'pull_request' && 'Dry' || inputs.job || 'Short' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore BitsKit.sln --locked-mode

      - name: Run benchmarks
        shell: pwsh
        run: ./eng/Run-Benchmarks.ps1 -Filter $env:BENCHMARK_FILTER -Job $env:BENCHMARK_JOB -NoRestore

      - name: Add results to workflow summary
        if: success()
        shell: pwsh
        run: |
          $reports = @(Get-ChildItem ./artifacts/benchmarks -Recurse -Filter '*-report-github.md')
          if ($reports.Count -eq 0) {
            throw 'BenchmarkDotNet did not produce a Markdown report.'
          }

          '# Benchmark results' | Add-Content $env:GITHUB_STEP_SUMMARY
          '' | Add-Content $env:GITHUB_STEP_SUMMARY
          '> These measurements describe this hosted run; use stable local hardware for regression claims.' | Add-Content $env:GITHUB_STEP_SUMMARY
          foreach ($report in $reports) {
            '' | Add-Content $env:GITHUB_STEP_SUMMARY
            Get-Content $report.FullName | Add-Content $env:GITHUB_STEP_SUMMARY
          }

      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: artifacts/benchmarks
          if-no-files-found: warn
          retention-days: 90
